name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET Framework Build Tools
      run: |
        choco install netfx-4.6.1-devpack -y
        choco install dotnet-8.0-sdk -y

    - name: Restore dependencies
      run: dotnet restore Zenith.sln

    - name: Build with MSBuild
      run: |
        $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
        & $msbuildPath Zenith.sln /p:Configuration=Release /t:Rebuild

    - name: Publish Windows EXE
      run: |
        dotnet publish Black-Midi-Render/Zenith.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -o ./publish

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Zenith-Windows-x64
        path: ./publish/Zenith.exe
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Mono
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-complete

    - name: Build with MSBuild
      run: |
        msbuild Zenith.sln /p:Configuration=Release /t:Rebuild

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Zenith-Linux-Build
        path: |
          **/bin/**/Release/**/*.dll
          **/bin/**/Release/**/*.exe
        retention-days: 30

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: Zenith-Windows-x64
        path: ./artifacts/windows

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/windows/Zenith.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
